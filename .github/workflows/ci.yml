name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npx tsc --noEmit

      - run: npx eslint "app/**/*.{ts,tsx}" "src/**/*.{ts,tsx}" --max-warnings=100
        continue-on-error: true
